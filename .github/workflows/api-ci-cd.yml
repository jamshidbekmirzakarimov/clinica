# Build, test and deploy our nodejs api to production

name: CI/CD Nodejs to ECR then EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # CI Code Checks
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Nodejs
        uses: actions/setup-node@v3
        with:
          node-version: 24.15.0

      - name: install dependencies
        run: npm ci
        working-directory: ./server

      - name: Lint
        run: npm run lint:ci
        working-directory: ./server

      - name: Run unit tests
        run: npm test
        working-directory: ./server

      - name: NPM audit (high severity)
        run: npm audit --audit-level=high
        working-directory: ./server

  # Deploy to production
  deploy:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

        # Login to AWS via OIDC instead of using AWS secrets access key that is dangerous
      - name: Configure AWS OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{secrets.AWS_OIDC_ROLE_ARN}}
          aws-region: ${{secrets.AWS_REGION}}

      # Login ECR
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{secrets.AWS_REGION}} | docker login --username AWS --password-stdin ${{secrets.ECR_REPOSITORY}}

      # Build Docker image
      - name: Build Docker image
        run: docker build --no-cache -t clinika-website:latest ./server

      # Tag Docker Image to ECR
      - name: Tag Docker Image to ECR
        run: docker tag clinika-website:latest ${{secrets.ECR_REPOSITORY}}:latest

      # Push Docker image
      - name: Push Docker image to ECR
        run: docker push ${{secrets.ECR_REPOSITORY}}:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2_KEY}}
          script: |
            docker pull ${{secrets.ECR_REPOSITORY}}:latest
            
            docker stop clinika-website || true
            docker rm -f clinika-website || true

            SECRETS_JSON=$(aws secretsmanager get-secret-value \
              --secret-id nodejs-prod-secrets \
              --query SecretString \
              --output text)
            export DATABASE_URL=$(echo $SECRETS_JSON | jq -r .DATABASE_URL)
            export ACCESS_TOKEN_SECRET=$(echo $SECRETS_JSON | jq -r .ACCESS_TOKEN_SECRET)
            export REFRESH_TOKEN_SECRET=$(echo $SECRETS_JSON | jq -r .REFRESH_TOKEN_SECRET)

            docker run -d \
              -p ${PORT:-5000}:5000 \
              --name clinika-website \
              -e DATABASE_URL \
              -e ACCESS_TOKEN_SECRET \
              -e REFRESH_TOKEN_SECRET \
              ${{secrets.ECR_REPOSITORY}}:latest